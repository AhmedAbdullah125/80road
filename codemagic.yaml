workflows:

  # ──────────────────────────────────────────────────────────────────────────────
  # iOS Release Workflow — produces a signed .ipa for App Store Connect
  # ──────────────────────────────────────────────────────────────────────────────
  ios-release:
    name: iOS Release (App Store)
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      node: 20.x
      xcode: latest
      cocoapods: default
      # Store these secrets in Codemagic → App Settings → Environment variables:
      #   CM_CERTIFICATE          — Base64-encoded Apple Distribution certificate (.p12)
      #   CM_CERTIFICATE_PASSWORD — Password for the .p12 certificate
      #   CM_PROVISIONING_PROFILE — Base64-encoded App Store provisioning profile
      #   APP_STORE_CONNECT_ISSUER_ID  — From App Store Connect API Key
      #   APP_STORE_CONNECT_KEY_ID     — From App Store Connect API Key
      #   APP_STORE_CONNECT_PRIVATE_KEY — Base64-encoded .p8 file content
      #   GOOGLE_SERVICE_INFO_PLIST   — Base64-encoded GoogleService-Info.plist (DO NOT commit to git)
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.eightyroad.app
      vars:
        BUNDLE_ID: com.eightyroad.app
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Write GoogleService-Info.plist (from CI secret)
        script: |
          echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/App/App/GoogleService-Info.plist

      - name: Next.js static export for mobile
        script: |
          npx cross-env MOBILE_BUILD=true NEXT_PUBLIC_IS_MOBILE=true npm run build

      - name: Capacitor sync (iOS)
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App && pod install --repo-update

      - name: Build and sign iOS app
        script: |
          xcode-project use-profiles
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            OTHER_CODE_SIGN_FLAGS="--keychain login.keychain" \
            CODE_SIGN_STYLE=Manual | xcpretty

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build \
            -exportOptionsPlist ios/ExportOptions.plist \
            | xcpretty

    artifacts:
      - build/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true


  # ──────────────────────────────────────────────────────────────────────────────
  # iOS Unsigned Build — for testing on Appetize.io / local simulator ONLY
  # This workflow produces an unsigned IPA that CANNOT be submitted to App Store.
  # ──────────────────────────────────────────────────────────────────────────────
  ios-unsigned-preview:
    name: iOS Unsigned (Preview/Test Only)
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      node: 20.x
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Next.js static export for mobile
        script: |
          npx cross-env MOBILE_BUILD=true NEXT_PUBLIC_IS_MOBILE=true npm run build

      - name: Capacitor sync (iOS)
        script: npx cap sync ios

      - name: Install CocoaPods
        script: cd ios/App && pod install

      - name: Build unsigned IPA (for testing only)
        script: |
          xcodebuild build \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

          mkdir -p build/Payload
          cp -r build/Build/Products/Release-iphoneos/App.app build/Payload
          cd build && zip -r 80road_preview.ipa Payload

    artifacts:
      - build/*.ipa


  # ──────────────────────────────────────────────────────────────────────────────
  # Android Release Workflow — produces signed AAB for Google Play
  # ──────────────────────────────────────────────────────────────────────────────
  android-release:
    name: Android Release (Google Play)
    max_build_duration: 120
    instance_type: linux_x2

    environment:
      node: 20.x
      java: 17
      # Store these in Codemagic → Environment variables:
      #   ANDROID_KEYSTORE       — Base64-encoded .jks or .keystore file
      #   ANDROID_KEYSTORE_PASSWORD
      #   ANDROID_KEY_ALIAS
      #   ANDROID_KEY_PASSWORD
      #   GOOGLE_PLAY_JSON_KEY   — Base64-encoded Google Play service account JSON
      vars:
        PACKAGE_NAME: com.eightyroad.app

    scripts:
      - name: Install Node dependencies
        script: npm ci

      - name: Next.js static export for mobile
        script: |
          npx cross-env MOBILE_BUILD=true NEXT_PUBLIC_IS_MOBILE=true npm run build

      - name: Capacitor sync (Android)
        script: npx cap sync android

      - name: Decode and write keystore
        script: |
          echo "$ANDROID_KEYSTORE" | base64 --decode > android/app/release.keystore

      - name: Build signed AAB
        script: |
          cd android
          ./gradlew bundleRelease \
            -PANDROID_KEYSTORE_PATH=release.keystore \
            -PANDROID_KEYSTORE_PASSWORD="$ANDROID_KEYSTORE_PASSWORD" \
            -PANDROID_KEY_ALIAS="$ANDROID_KEY_ALIAS" \
            -PANDROID_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"

    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
      - android/app/build/outputs/mapping/release/mapping.txt

    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_JSON_KEY
        track: internal
        submit_as_draft: true
